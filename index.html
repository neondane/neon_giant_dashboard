<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Neon Giant — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--bg2:#0b1120;--card:#0e1527;--bdr:#182440;--cy:#00e5ff;--pu:#8b5cf6;--pk:#ff69b4;--gn:#00e676;--rd:#ff1744;--am:#ffc400;--wh:#edf2f7;--gr:#7e90a8;--gd:#4a5a75;--f:'Sora',system-ui,sans-serif;--m:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--wh);font-family:var(--f);overflow-x:hidden}
::selection{background:var(--cy);color:var(--bg)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#243160;border-radius:2px}
.hd{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.logo{height:44px;filter:drop-shadow(0 0 8px rgba(0,229,255,.15))}
.hd-center{display:flex;gap:2px;background:rgba(14,21,39,.9);border:1px solid var(--bdr);border-radius:9px;padding:2px}
.tab{padding:6px 14px;border-radius:7px;font-size:10px;font-weight:600;color:var(--gd);cursor:pointer;transition:all .2s;letter-spacing:.4px;border:none;background:none;font-family:var(--f)}
.tab:hover{color:var(--wh)}.tab.a{background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(139,92,246,.06));color:var(--cy);box-shadow:0 0 10px rgba(0,229,255,.06)}
.filters{padding:6px 24px;display:flex;gap:6px;align-items:center;border-bottom:1px solid rgba(24,36,64,.4);min-height:38px}
.flt-label{font-size:8px;color:var(--gd);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
select{background:var(--card);color:var(--wh);border:1px solid var(--bdr);padding:4px 8px;border-radius:6px;font-family:var(--f);font-size:9px;cursor:pointer}
select:hover{border-color:var(--cy)}.fw{display:flex;gap:6px;align-items:center}
#app{padding:16px 24px 36px}
.wk-label{font-size:10px;color:var(--gd);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kc{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:11px 13px;position:relative;overflow:hidden;transition:all .25s}
.kc:hover{border-color:rgba(0,229,255,.2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.kc .glow{position:absolute;top:0;left:0;right:0;height:2px}
.kl{font-size:7.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gd);font-weight:600;margin-bottom:4px}
.kv{font-size:18px;font-weight:800;font-family:var(--m);line-height:1}
.ks{font-size:8px;color:var(--gr);margin-top:3px;display:flex;align-items:center;gap:3px}
.kd{font-weight:700;font-size:9px}.kd.up{color:var(--gn)}.kd.dn{color:var(--rd)}.kd.w{color:var(--am)}
.kp{margin-top:6px;height:2px;background:rgba(255,255,255,.03);border-radius:1px;overflow:hidden}
.kpb{height:100%;border-radius:1px}
.st{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--cy);font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent)}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.bx{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:14px;min-height:190px;position:relative;overflow:hidden}
.bx::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.1),transparent)}
.bx.w{grid-column:span 2}
.bt{font-size:9px;color:var(--gr);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:8px}
canvas{width:100%!important;display:block}
.tip{position:absolute;background:#131b30;border:1px solid var(--cy);color:var(--wh);padding:6px 10px;border-radius:7px;font-size:9px;pointer-events:none;z-index:50;white-space:nowrap;display:none;font-family:var(--m);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.fn{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap}
.fs{text-align:center;padding:4px 0}.fv{font-size:20px;font-weight:800;font-family:var(--m)}
.fl{font-size:7px;text-transform:uppercase;letter-spacing:1.8px;color:var(--gr);margin-top:2px}
.fa{font-size:14px;color:#3d4f6a;margin:0 8px}.fr{font-size:8px;color:var(--cy);font-weight:600;margin-top:1px}
@media(max-width:1100px){.cg{grid-template-columns:1fr}.bx.w{grid-column:span 1}
div[style*="grid-template-columns:240px"]{grid-template-columns:1fr!important}
div[style*="grid-template-columns:220px"]{grid-template-columns:1fr!important}}
</style></head><body>

  var ytd26=0;for(var i=0;i<12;i++)ytd26+=n(r26[i]);h+=kpi('2026 YTD',f$(ytd26),'',null,'cy');
  h+='</div>';

  h+='<div class="st">Year-over-Year</div>';
  // Grouped bar chart by quarter
  h+='<div class="bx w" style="min-height:280px"><div class="bt">Revenue by Month \u00B7 All Years</div><canvas id="h1"></canvas></div>';
  h+='<div class="cg" style="margin-top:12px">';
  h+='<div class="bx"><div class="bt">Leads</div><canvas id="h2"></canvas></div>';
  h+='<div class="bx"><div class="bt">Booking %</div><canvas id="h3"></canvas></div></div>';

  document.getElementById('app').innerHTML=h;
  setTimeout(function(){
    var rd=[];for(var yi=0;yi<yrs.length;yi++){var y=yrs[yi];var dd=[];for(var mi=0;mi<12;mi++){var r=null;for(var j=0;j<yd[y].length;j++){if(yd[y][j].month_num===mi+1){r=n(yd[y][j].net_revenue);break}}dd.push(r)}rd.push({label:String(y),data:dd,borderColor:yc[y],lineWidth:y===2025?2.5:1.5,points:false})}
    rd.push({label:'2026',data:r26.map(function(v){return v>0?v:null}),borderColor:yc[2026],lineWidth:3});
    draw('h1',{type:'line',labels:MO,yFmt:'$k',height:240,datasets:rd});
    var ld=[];for(var yi=0;yi<yrs.length;yi++){var y=yrs[yi];var dd=[];for(var mi=0;mi<12;mi++){var r=null;for(var j=0;j<yd[y].length;j++){if(yd[y][j].month_num===mi+1){r=n(yd[y][j].total_leads);break}}dd.push(r)}ld.push({label:String(y),data:dd,borderColor:yc[y],lineWidth:y===2025?2.5:1.5,points:false})}
    ld.push({label:'2026',data:getMR('25').slice(0,12).map(function(v){return v>0?v:null}),borderColor:yc[2026],lineWidth:3});
    draw('h2',{type:'line',labels:MO,height:200,datasets:ld});
    var bd=[];for(var yi=0;yi<yrs.length;yi++){var y=yrs[yi];var dd=[];for(var mi=0;mi<12;mi++){var r=null;for(var j=0;j<yd[y].length;j++){if(yd[y][j].month_num===mi+1&&yd[y][j].booking_pct){r=yd[y][j].booking_pct*100;break}}dd.push(r)}bd.push({label:String(y),data:dd,borderColor:yc[y],lineWidth:y===2025?2.5:1.5,points:false})}
    var bp26=[];for(var i=0;i<12;i++){var v=getMR('31')[i];bp26.push(v?v*100:null)}
    bd.push({label:'2026',data:bp26,borderColor:yc[2026],lineWidth:3});
    draw('h3',{type:'line',labels:MO,yFmt:'%',height:200,datasets:bd});
  },50);
}

// ═════════════ MARKETING ═════════════
function renderMktg(){
  var mIdx=parseInt(fM.value);var mo=MO[mIdx];
  var allIx=aW();var mIx=[];for(var i=0;i<allIx.length;i++){if(D.weeks[allIx[i]].month===mo)mIx.push(allIx[i])}
  var w=D.weekly;var mSpend=0,mConv=0,mLeads=0,mRev=0;
  for(var i=0;i<mIx.length;i++){var ii=mIx[i];mSpend+=n(w.ad_spend[ii]);mConv+=n(w.conversions[ii]);mLeads+=n(w.leads[ii]);mRev+=n(w.net_revenue[ii])}
  var cpl=mLeads>0?mSpend/mLeads:0;var mer=mSpend>0?mRev/mSpend:0;
  var sd=srcFor(mIx);

  var h='<div class="wk-label">\u{1F4CA} Marketing \u00B7 '+MO[mIdx]+'</div><div class="kg">';
  h+=kpi('Ad Spend',f$(mSpend),'',null,'pk');
  h+=kpi('Revenue',f$(mRev),'',null,'cy');
  h+=kpi('CPL',f$(cpl),'',null,cpl>0&&cpl<40?'gn':cpl<60?'am':'rd');
  h+=kpi('MER (Mktg Efficiency)',mer.toFixed(1)+'x','rev \u00F7 spend',null,mer>=20?'gn':mer>=10?'am':'rd');
  h+='</div>';
  h+='<div class="cg">';
  h+='<div class="bx"><div class="bt">Revenue by Source</div><canvas id="mk1"></canvas></div>';
  h+='<div class="bx"><div class="bt">Leads by Source</div><canvas id="mk2"></canvas></div>';
  h+='<div class="bx"><div class="bt">Spend by Paid Source</div><canvas id="mk3"></canvas></div>';
  h+='<div class="bx"><div class="bt">CPL by Paid Source</div><canvas id="mk4"></canvas></div></div>';

  document.getElementById('app').innerHTML=h;
  setTimeout(function(){
    drawSrcRev('mk1',sd);
    var lidx=[0,1,2,3,4];lidx.sort(function(a,b){return sd.leads[b]-sd.leads[a]});
    var ln=[],lv=[],lc=[];for(var i=0;i<5;i++){if(sd.leads[lidx[i]]>0){ln.push(sd.names[lidx[i]]);lv.push(sd.leads[lidx[i]]);lc.push(SC[lidx[i]])}}
    if(ln.length>0)drawH('mk2',ln,lv,lc,'#');
    var sidx=[0,1,2,3];sidx.sort(function(a,b){return sd.spends[b]-sd.spends[a]});
    var sn=[],sv=[],sc2=[];for(var i=0;i<4;i++){if(sd.spends[sidx[i]]>0){sn.push(sd.names[sidx[i]]);sv.push(sd.spends[sidx[i]]);sc2.push(SC[sidx[i]])}}
    if(sn.length>0)drawH('mk3',sn,sv,sc2,'$');
    var cidx=[0,1,2,3];cidx.sort(function(a,b){return sd.cpls[a]-sd.cpls[b]});
    var cn=[],cv2=[],cc=[];for(var i=0;i<4;i++){if(sd.leads[cidx[i]]>0){cn.push(sd.names[cidx[i]]);cv2.push(sd.cpls[cidx[i]]);cc.push(SC[cidx[i]])}}
    if(cn.length>0)drawH('mk4',cn,cv2,cc,'$');
  },50);
}

function render(){if(ct==='exec')renderExec();else if(ct==='weekly')renderWeekly();else if(ct==='monthly')renderMonthly();else if(ct==='yearly')renderYearly();else if(ct==='hist')renderHist();else if(ct==='mktg')renderMktg()}
window.addEventListener('resize',function(){setTimeout(render,80)});
showFilters();render();

</script></body></html>
