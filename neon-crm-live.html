<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Giant CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pink:#e33b93;--blue:#22aee4;--dark:#08080d;--dark2:#10101a;--dark3:#1a1a28;--dark4:#24243a;--gray:#8888aa;--white:#f0f0f5;--green:#33cc66;--orange:#ff9933;--red:#ff3366}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--white);font-family:'Outfit',system-ui,sans-serif;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}select,input,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--dark3);border-radius:3px}

.hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dark3);position:sticky;top:0;z-index:100;background:rgba(8,8,13,0.92);backdrop-filter:blur(16px)}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{height:40px;border-radius:5px}
.brand{font-size:17px;font-weight:800;letter-spacing:-0.02em}
.brand-sub{font-size:9px;color:var(--gray);letter-spacing:0.1em;text-transform:uppercase}
.hdr-actions{display:flex;gap:8px}
.btn-a{border:none;color:#fff;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.btn-mic{background:linear-gradient(135deg,var(--pink),var(--blue));box-shadow:0 3px 16px #e33b9333}
.btn-cam{background:linear-gradient(135deg,#22aee4,#1a8fc4);box-shadow:0 3px 16px #22aee433}
.btn-add{background:var(--dark3);border:1px solid var(--dark4)}

.tabs{display:flex;border-bottom:1px solid var(--dark3);padding:0 16px;overflow-x:auto}
.tab{padding:11px 16px;font-size:12px;font-weight:600;color:var(--gray);border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--pink);border-bottom-color:var(--pink)}.tab:hover{color:var(--white)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.st{background:var(--dark2);border-radius:10px;padding:12px;border:1px solid var(--dark3)}
.st-v{font-size:22px;font-weight:800}.st-l{font-size:10px;color:var(--gray);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

.content{padding:0 16px 100px;max-width:1100px;margin:0 auto}
.filters{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:var(--dark2);border:1px solid var(--dark3);color:var(--white);padding:9px 12px;border-radius:9px;font-size:12px;outline:none}
.filters input{flex:1 1 160px;min-width:120px}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.pill{padding:4px 11px;border-radius:14px;font-size:11px;background:var(--dark3);color:var(--gray);border:1px solid transparent;cursor:pointer;transition:all .2s}
.pill.on{background:#e33b9333;color:var(--pink);border-color:#e33b9355}

.card{background:var(--dark2);border-radius:11px;padding:13px 15px;border:1px solid var(--dark3);margin-bottom:7px;cursor:pointer;transition:all .15s;border-left:3px solid var(--gray)}
.card:hover{border-color:#22aee433}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.c-name{font-size:14px;font-weight:700}.c-role{color:var(--gray);font-size:11px;margin-top:1px}.c-biz{color:#e33b93bb}
.c-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}.c-meta span{font-size:10px;color:var(--gray)}.c-meta .ref{color:var(--pink)}
.c-days{text-align:right;flex-shrink:0}.c-days b{font-size:17px;font-weight:800;display:block}.c-days small{font-size:9px;color:var(--gray)}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;margin-left:5px}
.rem-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:7px;background:#ff993322;color:var(--orange);border:1px solid #ff993344;margin-top:3px}

/* Loading */
.loading{text-align:center;padding:60px 20px}
.loading .spinner{width:40px;height:40px;margin:0 auto 14px;border:3px solid var(--dark3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark2);border:1px solid var(--dark3);color:var(--white);padding:10px 20px;border-radius:10px;font-size:13px;z-index:2000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

.overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.75);display:none}
.overlay.open{display:flex;justify-content:flex-end}
.panel{width:min(480px,100%);background:var(--dark);height:100%;overflow-y:auto;border-left:1px solid var(--dark3)}
.p-hdr{padding:16px 20px;border-bottom:1px solid var(--dark3);display:flex;justify-content:space-between;align-items:flex-start}
.p-close{background:var(--dark3);border:none;color:var(--gray);font-size:15px;width:30px;height:30px;border-radius:7px}
.p-body{padding:18px 20px}
.p-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.p-st{background:var(--dark2);border-radius:9px;padding:12px 10px;text-align:center}
.p-st .v{font-size:20px;font-weight:800}.p-st .l{font-size:10px;color:var(--gray);margin-top:3px}
.p-info{background:var(--dark2);border-radius:9px;padding:13px 15px;margin-bottom:16px}
.p-info h5{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:8px}
.p-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.p-row .k{color:var(--gray)}.p-row .val{color:var(--white)}
.visit{background:var(--dark2);border-radius:9px;padding:11px 13px;margin-bottom:7px;border-left:3px solid var(--blue)}
.visit.orig{border-left-color:var(--gray)}
.visit .vd{color:var(--blue);font-size:11px;font-weight:600}.visit .vh{color:var(--gray);font-size:11px}
.visit .vn{color:var(--white);font-size:12px;line-height:1.5;margin-top:4px}
.rem-sec{background:var(--dark2);border-radius:9px;padding:13px 15px;margin-bottom:16px;border:1px dashed var(--orange)}
.rem-sec h5{color:var(--orange);font-size:12px;margin-bottom:7px}
.rem-item{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--dark3)}
.rem-item:last-child{border:none}.rem-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0}

/* Forms */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--dark2);border:1px solid var(--dark3);color:var(--white);padding:10px 12px;border-radius:8px;font-size:13px;outline:none}
.form-group textarea{min-height:60px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--pink),var(--blue));margin-top:8px}
.btn-cancel{width:100%;padding:10px;border:1px solid var(--dark3);border-radius:10px;font-size:13px;font-weight:600;color:var(--gray);background:none;margin-top:6px}

.fs-overlay{position:fixed;inset:0;z-index:1000;background:var(--dark);display:none;flex-direction:column;overflow:auto}
.fs-overlay.open{display:flex}
.fs-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dark3);flex-shrink:0}
.fs-cancel{background:none;border:none;color:var(--gray);font-size:13px;padding:4px 8px}
.fs-save{background:var(--pink);border:none;color:#fff;font-size:13px;padding:8px 16px;border-radius:8px;font-weight:600}
.fs-body{flex:1;overflow:auto;padding:18px}

.mic{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--blue));border:none;position:relative;box-shadow:0 0 36px #e33b9344,0 0 72px #22aee422;margin:0 auto;display:block}
.mic svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.mic.rec{animation:mic-pulse 1.5s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 36px #e33b9344}50%{box-shadow:0 0 60px #e33b9388}}
.lis-badge{display:inline-flex;align-items:center;gap:7px;background:#e33b9322;padding:7px 18px;border-radius:18px;border:1px solid #e33b9344}
.lis-dot{width:9px;height:9px;border-radius:50%;background:var(--pink);animation:pulse 1s infinite}
.trns-box{background:var(--dark2);border-radius:11px;padding:16px;color:var(--white);font-size:14px;line-height:1.7;min-height:90px;margin-top:14px}
.spinner{width:40px;height:40px;margin:0 auto 14px;border:3px solid var(--dark3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

#mapBox{width:100%;height:420px;border-radius:11px;overflow:hidden;border:1px solid var(--dark3);margin:12px 0}
.leaflet-container{background:var(--dark)!important}
.map-lbl{background:transparent;border:none;font-family:'Outfit',sans-serif;white-space:nowrap}
.map-lbl div{text-align:center}
.ml-name{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.7)}
.ml-cnt{font-size:10px;font-weight:800;color:#e33b93;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.ml-sel{padding:1px 7px;background:var(--blue);border-radius:5px;color:#fff}
.neon-pop .leaflet-popup-content-wrapper{background:var(--dark2);color:var(--white);border:1px solid var(--dark3);border-radius:9px;font-family:'Outfit',sans-serif}
.neon-pop .leaflet-popup-tip{background:var(--dark2)}
.neon-pop .leaflet-popup-content{margin:9px 13px;font-size:12px;line-height:1.5}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.brand{font-size:14px}.btn-a span{display:none}.btn-a{padding:9px 12px}#mapBox{height:320px}}
</style>
</head>

<script>
const API='https://script.google.com/macros/s/AKfycbwcMb_ZWBEsWa-lKci7aTkBdlfwAq6JcA2N9vTkLcI3OkwN1PW9dPdU3bPt8RJ1MkVrzw/exec';
const TERR=["All Territories","Anacortes","Burlington","Oak Harbor","Mt. Vernon","Sedro-Woolley","Bellingham","North of Bellingham","Snohomish","South Whidbey","Arlington","Stanwood","La Conner"];
const TYPES=["Real Estate Agency","Self-Storage Facility","U-Haul Dealer","Assisted Living / Senior Care","Apartment Complex","Property Management","Estate Sale Company","Attorney / Law","Home Services","Other"];
const TEAM=["Dane","Tyler","Valentina","Jeff","Luke","Carlos","Marshall","Samuel","Ryan","William","Charles","Michael"];
const SC=[{l:"Hot",c:"#ff3366",e:"🔥"},{l:"Warm",c:"#ff9933",e:"☀️"},{l:"Cool",c:"#22aee4",e:"❄️"},{l:"New",c:"#8888aa",e:"🆕"}];
const TC={"Anacortes":[48.5126,-122.6127],"Burlington":[48.4757,-122.3254],"Oak Harbor":[48.2932,-122.6433],"Mt. Vernon":[48.4201,-122.334],"Sedro-Woolley":[48.5037,-122.2366],"Bellingham":[48.7519,-122.4787],"North of Bellingham":[48.86,-122.51],"Snohomish":[48.166,-122.22],"South Whidbey":[48.12,-122.68],"Arlington":[48.1987,-122.1254],"Stanwood":[48.2404,-122.3706],"La Conner":[48.3921,-122.4932]};

let contacts=[],visits=[],reminders=[];
let tab='dash',fT='All Territories',fTy='All Types',fS='',srt='urgency';
let lmap=null,mMarkers=[];
let dataLoaded=false;

// ─── API ────────────────────────────────────────────────────
async function apiGet(action){
  const r=await fetch(API+'?action='+action);
  return r.json();
}
async function apiPost(data){
  const r=await fetch(API,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'text/plain'}});
  return r.json();
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type;t.style.display='block';
  setTimeout(()=>{t.style.display='none'},3000);
}

// ─── LOAD DATA ──────────────────────────────────────────────
async function loadData(){
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div><div style="color:var(--gray);font-size:13px">Loading CRM data...</div></div>';
  try{
    const d=await apiGet('getAll');
    contacts=d.contacts||[];
    visits=d.visits||[];
    reminders=(d.reminders||[]).filter(r=>r.status==='active');
    dataLoaded=true;
    render();
  }catch(e){
    document.getElementById('mc').innerHTML='<div class="loading"><div style="color:var(--red);font-size:14px">Failed to load data</div><div style="color:var(--gray);font-size:12px;margin-top:8px">'+e.message+'</div><button class="btn-a btn-mic" style="margin-top:16px" onclick="loadData()">Retry</button></div>';
  }
}

// ─── HELPERS ────────────────────────────────────────────────
function ds(d){if(!d)return 999;const dt=typeof d==='string'?new Date(d):d;return Math.floor((new Date()-dt)/864e5)}
function uc(d){return d<=14?'var(--green)':d<=30?'var(--blue)':d<=60?'var(--orange)':'var(--red)'}
function uh(d){return d<=14?'#33cc66':d<=30?'#22aee4':d<=60?'#ff9933':'#ff3366'}
function fd(d){if(!d)return'—';const dt=typeof d==='string'?new Date(d+'T00:00:00'):new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}

function getContactReminders(cid){return reminders.filter(r=>Number(r.contactId)===Number(cid))}

function switchTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render()}

function render(){if(!dataLoaded)return;renderStats();const mc=document.getElementById('mc');if(tab==='dash')renderDash(mc);else if(tab==='map')renderMap(mc);else renderRem(mc)}

function renderStats(){
  const t=contacts.length,o=contacts.filter(c=>ds(c.lastVisit)>30).length;
  const h=contacts.filter(c=>Number(c.score)===0).length,r=reminders.length;
  document.getElementById('statsRow').innerHTML=`<div class="st"><div class="st-v" style="color:var(--white)">${t}</div><div class="st-l">Contacts</div></div><div class="st"><div class="st-v" style="color:var(--red)">${o}</div><div class="st-l">Overdue 30d+</div></div><div class="st"><div class="st-v" style="color:var(--pink)">${h}</div><div class="st-l">Hot Leads</div></div><div class="st"><div class="st-v" style="color:var(--orange)">${r}</div><div class="st-l">Reminders</div></div>`;
}

function getF(){
  return contacts.filter(c=>{
    if(fT!=='All Territories'&&c.territory!==fT)return false;
    if(fTy!=='All Types'&&c.type!==fTy)return false;
    if(fS){const q=fS.toLowerCase();return(c.business||'').toLowerCase().includes(q)||(c.name||'').toLowerCase().includes(q)}return true;
  }).sort((a,b)=>srt==='urgency'?ds(b.lastVisit)-ds(a.lastVisit):srt==='referrals'?(Number(b.referrals)||0)-(Number(a.referrals)||0):(a.name||'').localeCompare(b.name||''));
}

function ccHTML(c){
  const d=ds(c.lastVisit),s=SC[Number(c.score)||0],cr=getContactReminders(c.id);
  const rb=cr.length?`<div class="rem-badge">📌 ${cr.length} reminder${cr.length>1?'s':''}</div>`:'';
  return`<div class="card" style="border-left-color:${uc(d)}" onclick="openPanel(${c.id})"><div class="card-top"><div style="flex:1;min-width:0"><div><span class="c-name">${c.name||'—'}</span><span class="badge" style="background:${s.c}22;color:${s.c}">${s.e} ${s.l}</span></div><div class="c-role">${c.role||''} · <span class="c-biz">${c.business||''}</span></div><div class="c-meta"><span>📍 ${c.territory||'—'}</span><span>👤 ${c.handler||'—'}</span><span class="ref">🎁 ${c.referrals||0}</span></div>${rb}</div><div class="c-days"><b style="color:${uc(d)}">${d}d</b><small>since visit</small></div></div></div>`;
}

function renderDash(mc){
  const tb={};contacts.forEach(c=>{const t=c.type||'Other';tb[t]=(tb[t]||0)+1});
  let pills=Object.entries(tb).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<span class="pill${fTy===t?' on':''}" onclick="fTy=fTy==='${t}'?'All Types':'${t}';render()">${t} <b style="color:var(--white)">${n}</b></span>`).join('');
  const f=getF();
  const empty=contacts.length===0?`<div style="text-align:center;padding:40px;color:var(--gray)"><div style="font-size:16px;margin-bottom:8px">No contacts yet</div><div style="font-size:13px">Click <b>Add</b> to create your first contact, or import from your old spreadsheet.</div></div>`:'';
  mc.innerHTML=`<div class="pills">${pills}</div><div class="filters"><input type="text" placeholder="Search contacts..." value="${fS}" oninput="fS=this.value;render()"><select onchange="fT=this.value;render()">${TERR.map(t=>`<option${fT===t?' selected':''}>${t}</option>`).join('')}</select><select onchange="srt=this.value;render()"><option value="urgency"${srt==='urgency'?' selected':''}>Most Overdue</option><option value="referrals"${srt==='referrals'?' selected':''}>Most Referrals</option><option value="name"${srt==='name'?' selected':''}>Name A-Z</option></select></div><div style="color:var(--gray);font-size:11px;margin-bottom:8px">${f.length} contact${f.length!==1?'s':''}</div>${empty}${f.map(c=>ccHTML(c)).join('')}`;
}

// ─── MAP ────────────────────────────────────────────────────
function renderMap(mc){
  const f=getF();
  mc.innerHTML=`<div style="margin:10px 0 5px;font-size:12px;color:var(--gray)">Click a territory to filter</div><div id="mapBox"></div><div id="mapInfo" style="color:var(--gray);font-size:11px;margin:8px 0">${fT!=='All Territories'?`<b style="color:var(--blue)">${fT}</b> — `:''}${f.length} contact${f.length!==1?'s':''}</div><div id="mapCards">${f.map(c=>ccHTML(c)).join('')}</div>`;
  setTimeout(initMap,50);
}
function initMap(){
  if(lmap){lmap.remove();lmap=null}mMarkers=[];
  const el=document.getElementById('mapBox');if(!el)return;
  lmap=L.map('mapBox',{center:[48.45,-122.40],zoom:9,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(lmap);
  const tc={},tw={};contacts.forEach(c=>{if(!c.territory)return;tc[c.territory]=(tc[c.territory]||0)+1;const d=ds(c.lastVisit);if(!tw[c.territory]||d>tw[c.territory])tw[c.territory]=d});
  Object.entries(TC).forEach(([nm,co])=>{
    const cnt=tc[nm]||0,worst=tw[nm]||0,col=uh(worst),sel=fT===nm;
    const r=Math.max(11,Math.min(28,9+cnt*4));
    const ci=L.circleMarker(co,{radius:r,fillColor:sel?'#22aee4':col,color:sel?'#22aee4':col,weight:sel?3:2,opacity:sel?1:.8,fillOpacity:sel?.4:.2}).addTo(lmap);
    const lb=L.marker(co,{icon:L.divIcon({className:'map-lbl',html:`<div><div class="ml-name${sel?' ml-sel':''}">${nm}</div><div class="ml-cnt">${cnt}</div></div>`,iconSize:[120,36],iconAnchor:[60,18]})}).addTo(lmap);
    const tc2=contacts.filter(c=>c.territory===nm);
    let pp=`<div style="min-width:180px"><b style="color:#e33b93">${nm}</b><br><span style="color:#8888aa;font-size:10px">${cnt} contacts</span><hr style="border-color:#1a1a25;margin:5px 0">`;
    tc2.forEach(c=>{const d=ds(c.lastVisit);pp+=`<div style="margin:3px 0;cursor:pointer" onclick="openPanel(${c.id})"><span style="color:${uh(d)};font-weight:700">${d}d</span> ${c.name} <span style="color:#8888aa;font-size:10px">· ${c.role||''}</span></div>`});
    pp+=`</div>`;ci.bindPopup(pp,{className:'neon-pop',maxWidth:260});
    const click=()=>{fT=fT===nm?'All Territories':nm;const f2=getF();const ce=document.getElementById('mapCards');if(ce)ce.innerHTML=f2.map(x=>ccHTML(x)).join('');updMap()};
    ci.on('click',click);lb.on('click',click);mMarkers.push({nm,ci,lb});
  });
}
function updMap(){const tc={},tw={};contacts.forEach(c=>{if(!c.territory)return;tc[c.territory]=(tc[c.territory]||0)+1;const d=ds(c.lastVisit);if(!tw[c.territory]||d>tw[c.territory])tw[c.territory]=d});mMarkers.forEach(({nm,ci,lb})=>{const col=uh(tw[nm]||0),sel=fT===nm;ci.setStyle({fillColor:sel?'#22aee4':col,color:sel?'#22aee4':col,weight:sel?3:2});lb.setIcon(L.divIcon({className:'map-lbl',html:`<div><div class="ml-name${sel?' ml-sel':''}">${nm}</div><div class="ml-cnt">${tc[nm]||0}</div></div>`,iconSize:[120,36],iconAnchor:[60,18]}))})}

// ─── REMINDERS ──────────────────────────────────────────────
function renderRem(mc){
  const grouped={};reminders.forEach(r=>{const cid=Number(r.contactId);if(!grouped[cid])grouped[cid]=[];grouped[cid].push(r)});
  const entries=Object.entries(grouped).map(([cid,rems])=>{const c=contacts.find(x=>Number(x.id)===Number(cid));return{c,rems}}).filter(x=>x.c).sort((a,b)=>ds(b.c.lastVisit)-ds(a.c.lastVisit));
  let h=`<div style="margin:14px 0 10px;font-size:13px;color:var(--gray)">${entries.length} contacts with active reminders</div>`;
  entries.forEach(({c,rems})=>{const d=ds(c.lastVisit);h+=`<div class="card" style="border-left-color:var(--orange);margin-bottom:10px" onclick="openPanel(${c.id})"><div class="card-top"><div style="flex:1"><div class="c-name">${c.name} <span style="color:var(--gray);font-size:11px;font-weight:400">at ${c.business||''}</span></div><div class="c-role">📍 ${c.territory||''} · Last: ${fd(c.lastVisit)} (${d}d)</div></div></div><div style="margin-top:7px">${rems.map(r=>`<div class="rem-badge" style="margin:2px 3px 2px 0">📌 ${r.text}</div>`).join('')}</div></div>`});
  if(!entries.length)h+=`<div style="text-align:center;padding:50px;color:var(--gray)">No active reminders.</div>`;
  mc.innerHTML=h;
}

// ─── CONTACT PANEL ──────────────────────────────────────────
function openPanel(id){
  const c=contacts.find(x=>Number(x.id)===Number(id));if(!c)return;
  const d=ds(c.lastVisit),s=SC[Number(c.score)||0],cv=visits.filter(v=>Number(v.contactId)===Number(id)),cr=getContactReminders(id);
  let rs='';if(cr.length){rs=`<div class="rem-sec"><h5>📌 Reminders</h5>${cr.map(r=>`<div class="rem-item"><span class="rem-dot"></span>${r.text}</div>`).join('')}</div>`}
  let vh=cv.map(v=>`<div class="visit"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="vd">${fd(v.date)}</span><span class="vh">${v.handler}</span></div><div class="vn">${v.notes||''}</div></div>`).join('');
  if(c.notes)vh+=`<div class="visit orig"><div style="color:var(--gray);font-size:11px;margin-bottom:4px">Notes</div><div class="vn">${c.notes}</div></div>`;
  document.getElementById('pc').innerHTML=`
    <div class="p-hdr"><div><div style="font-size:19px;font-weight:700">${c.name||'—'}</div><div style="color:var(--gray);font-size:12px;margin-top:2px">${c.role||''} at ${c.business||''}</div></div><button class="p-close" onclick="closePanel()">✕</button></div>
    <div class="p-body">
      <div class="p-stats"><div class="p-st"><div class="v" style="color:${s.c}">${s.e}</div><div class="l" style="color:${s.c}">${s.l}</div></div><div class="p-st"><div class="v" style="color:var(--pink)">${c.referrals||0}</div><div class="l">Referrals</div></div><div class="p-st"><div class="v" style="color:${uc(d)}">${d}d</div><div class="l">Since Visit</div></div></div>
      ${rs}
      <div class="p-info"><h5>Contact Info</h5>
        <div class="p-row"><span class="k">Phone</span><span class="val">${c.phone||'—'}</span></div>
        <div class="p-row"><span class="k">Email</span><span class="val">${c.email||'—'}</span></div>
        <div class="p-row"><span class="k">Territory</span><span class="val">${c.territory||'—'}</span></div>
        <div class="p-row"><span class="k">Type</span><span class="val">${c.type||'—'}</span></div>
        <div class="p-row"><span class="k">Point Person</span><span class="val">${c.handler||'—'}</span></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn-a btn-mic" style="flex:1;justify-content:center" onclick="closePanel();openLogVisit(${c.id})">Log Visit</button>
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--blue);margin-bottom:9px">Visit History (${cv.length})</div>
      ${vh||'<div style="color:var(--gray);font-size:12px">No visits logged yet</div>'}
    </div>`;
  document.getElementById('ov').classList.add('open');
}
function closePanel(){document.getElementById('ov').classList.remove('open')}

// ─── ADD CONTACT FORM ───────────────────────────────────────
function openAddContact(){
  document.getElementById('addOv').classList.add('open');
  document.getElementById('addBody').innerHTML=`
    <div class="form-row"><div class="form-group"><label>Contact Name</label><input id="ac_name" placeholder="e.g. Steve"></div><div class="form-group"><label>Role / Title</label><input id="ac_role" placeholder="e.g. Office Manager"></div></div>
    <div class="form-group"><label>Business Name</label><input id="ac_biz" placeholder="e.g. Money Saver Mini Storage"></div>
    <div class="form-row"><div class="form-group"><label>Business Type</label><select id="ac_type">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="form-group"><label>Territory</label><select id="ac_terr">${TERR.slice(1).map(t=>`<option>${t}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="form-group"><label>Phone</label><input id="ac_ph" placeholder="360-555-0000"></div><div class="form-group"><label>Email</label><input id="ac_em" placeholder="name@company.com"></div></div>
    <div class="form-row"><div class="form-group"><label>Handled By</label><select id="ac_by">${TEAM.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="form-group"><label>Lead Score</label><select id="ac_sc"><option value="3">🆕 New</option><option value="2">❄️ Cool</option><option value="1">☀️ Warm</option><option value="0">🔥 Hot</option></select></div></div>
    <div class="form-group"><label>Notes</label><textarea id="ac_notes" placeholder="Any notes about this contact..."></textarea></div>
    <button class="btn-submit" onclick="submitContact()">Save Contact</button>
    <button class="btn-cancel" onclick="closeAdd()">Cancel</button>`;
}
function closeAdd(){document.getElementById('addOv').classList.remove('open')}

async function submitContact(){
  const c={
    name:document.getElementById('ac_name').value,
    role:document.getElementById('ac_role').value,
    business:document.getElementById('ac_biz').value,
    type:document.getElementById('ac_type').value,
    territory:document.getElementById('ac_terr').value,
    phone:document.getElementById('ac_ph').value,
    email:document.getElementById('ac_em').value,
    handler:document.getElementById('ac_by').value,
    score:Number(document.getElementById('ac_sc').value),
    notes:document.getElementById('ac_notes').value,
    referrals:0
  };
  if(!c.name){toast('Please enter a contact name','err');return}
  toast('Saving contact...','ok');
  try{
    const r=await apiPost({action:'addContact',contact:c});
    if(r.success){toast('✅ Contact saved!','ok');closeAdd();await loadData()}
    else{toast('Error: '+(r.error||'Unknown'),'err')}
  }catch(e){toast('Error: '+e.message,'err')}
}

// ─── LOG VISIT FORM ─────────────────────────────────────────
function openLogVisit(preselect){
  document.getElementById('visitOv').classList.add('open');
  const opts=contacts.map(c=>`<option value="${c.id}"${Number(c.id)===Number(preselect)?' selected':''}>${c.name} — ${c.business}</option>`).join('');
  document.getElementById('visitBody').innerHTML=`
    <div class="form-group"><label>Contact</label><select id="lv_cid">${opts}</select></div>
    <div class="form-row"><div class="form-group"><label>Handled By</label><select id="lv_by">${TEAM.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="form-group"><label>Date</label><input id="lv_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div>
    <div class="form-group"><label>Visit Notes</label><textarea id="lv_notes" rows="4" placeholder="What happened? What did you talk about?"></textarea></div>
    <div class="form-group"><label>Add Reminder (optional)</label><input id="lv_rem" placeholder="e.g. Drop off more flyers next time"></div>
    <button class="btn-submit" onclick="submitVisit()">Save Visit</button>
    <button class="btn-cancel" onclick="closeVisit()">Cancel</button>`;
}
function closeVisit(){document.getElementById('visitOv').classList.remove('open')}

async function submitVisit(){
  const cid=document.getElementById('lv_cid').value;
  const v={contactId:Number(cid),handler:document.getElementById('lv_by').value,date:document.getElementById('lv_date').value,notes:document.getElementById('lv_notes').value};
  const remText=document.getElementById('lv_rem').value;
  if(!v.notes){toast('Please add some notes','err');return}
  toast('Saving visit...','ok');
  try{
    const r=await apiPost({action:'addVisit',visit:v});
    if(r.success){
      if(remText){await apiPost({action:'addReminder',reminder:{contactId:Number(cid),text:remText}})}
      toast('✅ Visit logged!','ok');closeVisit();await loadData();
    }else{toast('Error: '+(r.error||'Unknown'),'err')}
  }catch(e){toast('Error: '+e.message,'err')}
}

// ─── INIT ───────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
