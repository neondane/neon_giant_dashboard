<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;}
@keyframes fillBar{from{width:0}to{width:var(--w)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.screen{
  width:100%;height:100vh;background:#0a0a0a;color:#fff;
  font-family:'Arial Black',Arial,sans-serif;
  padding:32px 48px 22px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.sas{position:absolute;right:-10px;bottom:0;height:100vh;opacity:0.35;pointer-events:none;z-index:0;}
.z{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-shrink:0;}
.brand{font-size:38px;font-weight:900;letter-spacing:.04em;line-height:1;}
.brand .bl{color:#22aee4;}.brand .pk{color:#e33b93;}
.tagline{font-size:13px;color:#f0c430;letter-spacing:.07em;text-transform:uppercase;font-family:Arial,sans-serif;margin-top:5px;}
.topright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-top:4px;}
.live-pill{display:flex;align-items:center;gap:8px;background:#1a1a1a;border:1px solid #333;border-radius:30px;padding:8px 18px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22aee4;animation:pulse 2s infinite;}
.live-txt{font-size:12px;color:#f0c430;letter-spacing:.1em;text-transform:uppercase;font-family:Arial,sans-serif;font-weight:700;}
.career-txt{font-size:13px;color:#f0c430;font-family:Arial,sans-serif;}
.slabel{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#f0c430;margin-bottom:10px;flex-shrink:0;font-family:Arial,sans-serif;}
.bars{display:flex;flex-direction:column;flex:1;justify-content:space-evenly;margin-bottom:18px;}
.brow{display:flex;align-items:center;}
.rnum{width:30px;font-size:14px;color:#aaa;font-weight:900;flex-shrink:0;}
.bnam{width:180px;font-size:17px;font-weight:900;color:#fff;text-align:right;padding-right:18px;flex-shrink:0;}
.btrack{flex:1;height:40px;background:#1a1a1a;border-radius:6px;overflow:hidden;border:1px solid #2a2a2a;}
.bfill{height:100%;border-radius:6px;width:var(--w);animation:fillBar 1.3s cubic-bezier(.4,0,.2,1) forwards;position:relative;overflow:hidden;}
.bfill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,0.08);border-radius:6px 6px 0 0;}
.bpts{width:90px;text-align:right;font-size:22px;font-weight:900;padding-left:16px;flex-shrink:0;}
.btier{width:80px;font-size:11px;color:#ccc;padding-left:10px;flex-shrink:0;font-family:Arial,sans-serif;}
.rewards-wrap{flex-shrink:0;border-top:1px solid #2a2a2a;padding-top:16px;}
.tgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.tcard{background:#161616;border-radius:10px;padding:12px 14px;border-left:3px solid;}
.tpts{font-size:20px;font-weight:900;margin-bottom:3px;}
.tlbl{font-size:8px;color:#f0c430;text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;font-family:Arial,sans-serif;font-weight:700;}
.topt{font-size:11px;color:#ccc;line-height:1.85;font-family:Arial,sans-serif;}
.topt .arr{margin-right:3px;}
</style>
</head>

  <div class="z">
    <div class="topbar">
      <div>
        <div class="brand"><span class="bl">NEON</span> <span class="pk">GIANT</span></div>
        <div class="tagline">We don&rsquo;t just move boxes &mdash; we brighten people&rsquo;s days</div>
      </div>
      <div class="topright">
        <div class="live-pill"><div class="live-dot"></div><div class="live-txt" id="liveStatus">Live</div></div>
        <div class="career-txt">Career Points &bull; All Time</div>
        <div class="career-txt" id="lastUpdated" style="font-size:11px;opacity:0.6;"></div>
      </div>
    </div>
    <div class="slabel">Crew Leaderboard &mdash; Career Points</div>
    <div class="bars" id="bars"></div>
    <div class="rewards-wrap">
      <div class="slabel" style="margin-bottom:12px;">Neon Rewards &mdash; Redeem Anytime</div>
      <div class="tgrid" id="tgrid"></div>
    </div>
  </div>
</div>
<script>
const BLUE='#22aee4', PINK='#e33b93';

// ── PASTE YOUR GOOGLE SHEET CSV URL HERE ──────────────────────
// Step 1: Open your Google Sheet
// Step 2: File → Share → Publish to web
// Step 3: Choose "Totals" tab → "Comma-separated values (.csv)" → Publish
// Step 4: Copy the URL and paste it below replacing the placeholder
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS9n03sC1lywlMnnA4QNJLOSOlZNivaxQiloD6-TKzm7QW578GP47zwlmMUkYuHXA/pub?gid=1554811516&single=true&output=csv';
const SHEET_URL = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV);
// ─────────────────────────────────────────────────────────────

// No hardcoded fallback — sheet is the only source of truth
const FALLBACK = [];

const TIERS=[
  {pts:500,  label:'Tier 1'},
  {pts:1500, label:'Tier 2'},
  {pts:2500, label:'Tier 3'},
  {pts:5000, label:'Tier 4'},
  {pts:7500, label:'Tier 5'},
  {pts:10000,label:'The Legend'},
];
function tierFor(p){let t='';for(const x of TIERS){if(p>=x.pts)t=x.label;}return t;}

const REWARDS=[
  {pts:500,  color:BLUE,label:'Tier 1',            opts:['Neon Giant Nike hat','Backspins Golf Simulator + drink','Custom branded merch']},
  {pts:1500, color:PINK,label:'Tier 2',            opts:["Max Dale's dinner for two",'Two rounds — Avalon Golf','Whale watching — Anacortes']},
  {pts:2500, color:BLUE,label:'Tier 3',            opts:['Couples massage','Two Mariners tickets','Two Mt. Baker lift tickets']},
  {pts:5000, color:PINK,label:'Tier 4',            opts:['Two nights at Semiahmoo','Two Seahawks tickets','Concert tickets for two']},
  {pts:7500, color:BLUE,label:'Tier 5',            opts:['Hot air balloon — Snohomish','Seahawks marquee game','Semiahmoo Love by the Water']},
  {pts:10000,color:PINK,label:'Tier 6 — The Legend',opts:['Vegas trip for two','Seahawks game day','Chartered fishing — Puget Sound']},
];

// Build rewards grid once
document.getElementById('tgrid').innerHTML = REWARDS.map(t=>
  `<div class="tcard" style="border-left-color:${t.color};">
    <div class="tpts" style="color:${t.color};">${t.pts.toLocaleString()}</div>
    <div class="tlbl">${t.label}</div>
    <div class="topt">${t.opts.map(o=>`<span class="arr" style="color:${t.color};">&rsaquo;</span>${o}`).join('<br>')}</div>
  </div>`
).join('');

function renderBars(crew) {
  if (!crew || crew.length === 0) {
    document.getElementById('bars').innerHTML = '<div style="color:#444;font-family:Arial,sans-serif;font-size:14px;padding:20px;">Loading crew data...</div>';
    return;
  }
  const sorted = [...crew].sort((a,b)=>b.pts-a.pts);
  document.getElementById('bars').innerHTML = sorted.map((m,i)=>{
    const pct=Math.min((m.pts/10000)*100,100).toFixed(1);
    const col=i%2===0?BLUE:PINK;
    return `<div class="brow">
      <div class="rnum">${i+1}</div>
      <div class="bnam">${m.name}</div>
      <div class="btrack"><div class="bfill" style="--w:${pct}%;background:${col};"></div></div>
      <div class="bpts" style="color:${col};">${m.pts.toLocaleString()}</div>
      <div class="btier">${tierFor(m.pts)}</div>
    </div>`;
  }).join('');
}

async function fetchSheet() {
  if (SHEET_URL === 'PASTE_YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
    renderBars(FALLBACK);
    return;
  }
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const lines = text.trim().split('\n');
    const crew = lines
      .map(line => {
        const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
        return { name: cols[0], pts: parseInt(cols[1]) };
      })
      .filter(m => m.name && m.name.length > 2 && !isNaN(m.pts));
    if (crew.length > 0) {
      renderBars(crew);
      document.getElementById('liveStatus').textContent = 'Live';
      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
        ' at ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    }
  } catch(e) {
    document.getElementById('liveStatus').textContent = 'Offline';
  }
}

// Initial load + refresh every 5 minutes
fetchSheet();
setInterval(fetchSheet, 5 * 60 * 1000);
</script>
